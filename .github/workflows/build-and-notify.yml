name: Build APK and Notify Telegram

on:
  push:
    branches:
      - main  # Or whichever branch name you use (e.g., master)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so we can grab clean commit details

      # 2. Set up Java environment (Metro needs JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      # 3. Grant execute permission for Gradle wrapper
      - name: Grant Execute Permission for Gradle
        run: chmod +x ./gradlew

      # 4. Compile the project and build the debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. Extract the commit title and full description body
      - name: Get Commit Details
        id: commit_info
        run: |
          # Grabs the first line of the commit message
          TITLE=$(git log -1 --format=%s)
          # Grabs everything else from the commit message body
          BODY=$(git log -1 --format=%b)
          
          # Handle multiline body text safely for GitHub Actions outputs
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # 6. Send the compiled APK alongside the commit message to Telegram
      - name: Send APK to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          document: app/build/outputs/apk/debug/app-debug.apk
          message: |
            🚀 **New Build Successful!**
            
            📌 **Commit:** ${{ steps.commit_info.outputs.title }}
            📝 **Description:**
            ${{ steps.commit_info.outputs.body }}
            
            📦 *The debug APK is attached below.*
