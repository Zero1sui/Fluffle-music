name: Quick Test Build

on:
  workflow_dispatch:
  
permissions:
  contents: write

# The core fix: mapping your actual GitHub secret name to what Python expects
env:
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build_quick:
    name: Quick Universal Release Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0 

      - name: Install Python Requests Dependency
        run: pip install requests

      - name: Notify Telegram Build Started
        env:
          VARIANT: foss
          BUILD_STATUS: started
        run: python ${{ github.workspace }}/Notify_telegram.py

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (No Lint)
        run: ./gradlew --console=plain assembleFossRelease --warning-mode summary -x lint -x lintFossRelease
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music.test
          METROLIST_APP_NAME: Metrolist Testing
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Move unsigned APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/foss/release"
          mkdir -p "$OUTPUT_DIR/out"
          find "$OUTPUT_DIR" -maxdepth 1 -name "*.apk" | xargs -I{} mv {} "$OUTPUT_DIR/out/app-universal-test-release.apk"

      - name: Upload Unsigned APK
        uses: actions/upload-artifact@v6
        with:
          name: app-universal-test-release
          path: app/build/outputs/apk/foss/release/out/*

      - name: Run Telegram Notification Script (Send APK)
        env:
          VARIANT: foss/release/out
          BUILD_STATUS: completed
        run: python ${{ github.workspace }}/Notify_telegram.py
